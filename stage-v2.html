<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谋士堂 | 实时舞台 - 谋士天团</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0b;
            --card-bg: #16161a;
            --text-primary: #ffffff;
            --text-secondary: #949499;
            --accent-color: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.15);
            --status-idle: #3f3f46;
            --status-active: #22c55e;
            --status-busy: #f59e0b;
            --border-color: #27272a;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        header {
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.875rem;
            padding: 6px 12px;
            background: var(--accent-glow);
            border-radius: 20px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Agent Grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .agent-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            opacity: 0;
            animation: slideIn 0.5s ease forwards;
        }

        .agent-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #27272a 0%, #18181b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            position: relative;
            flex-shrink: 0;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--card-bg);
            background-color: var(--status-idle);
            transition: background-color 0.3s ease;
        }

        .status-dot.active {
            background-color: var(--status-active);
        }

        .status-dot.busy {
            background-color: var(--status-busy);
        }

        .agent-identity {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .agent-role {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-action {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 12px;
            min-height: 40px;
        }

        .agent-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .agent-affect {
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .agent-model {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-family: 'Monaco', 'Consolas', monospace;
        }

        /* Activity Feed */
        .feed-section {
            margin-top: 48px;
        }

        .feed-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .feed-icon {
            font-size: 1.25rem;
        }

        .feed-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--accent-color);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
            transition: all 0.2s ease;
        }

        .feed-item:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateX(4px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .feed-agent {
            font-weight: 600;
            color: var(--text-primary);
        }

        .feed-action {
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .feed-time {
            float: right;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .agent-grid {
                grid-template-columns: 1fr;
            }

            .header-top {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>谋士堂 · Stage</h1>
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    LIVE
                </div>
            </div>
            <p class="subtitle">实时观看谋士团队处理任务、做决策、交付成果。每一个动作都记录在这里。</p>
        </header>

        <!-- Agent Grid -->
        <div class="agent-grid" id="agentGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>加载谋士状态...</div>
            </div>
        </div>

        <!-- Activity Feed -->
        <div class="feed-section">
            <div class="feed-header">
                <span class="feed-icon">⚡</span>
                <span>Recent Activity</span>
            </div>
            <div class="feed-list" id="feedList">
                <div class="empty-state">Waiting for events...</div>
            </div>
        </div>
    </div>

    <script>
        // 谋士配置
        const agentsConfig = [
            { id: 'zhugeliang', name: '诸葛亮', emoji: '💡', role: 'CEO/总指挥', model: 'Qwen3.5-Plus' },
            { id: 'guanzhong', name: '管仲', emoji: '🔧', role: 'CTO/技术架构', model: 'Qwen3.5-Plus' },
            { id: 'sunbin', name: '孙膑', emoji: '⚔️', role: '全栈开发', model: 'Qwen3.5-Plus' },
            { id: 'shangyang', name: '商鞅', emoji: '✍️', role: 'DevOps', model: 'Qwen3.5-Plus' },
            { id: 'xiaohe', name: '萧何', emoji: '📦', role: 'QA/测试', model: 'Qwen3.5-Plus' },
            { id: 'zhangliang', name: '张良', emoji: '📊', role: '侦察/竞品', model: 'Qwen3.5-Plus' },
            { id: 'fanli', name: '范蠡', emoji: '💰', role: 'CFO/财务', model: 'Qwen3.5-Plus' }
        ];

        const affects = ['focused', 'between loops', 'reflective'];
        const statusMap = {
            'working': 'active',
            'talking': 'active',
            'coffee': 'idle',
            'meeting': 'busy',
            'handoff': 'active',
            'idle': 'idle',
            'offline': 'idle'
        };

        let agentsData = [];
        let feedItems = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadOfficeState();
            setInterval(loadOfficeState, 5000); // 5 秒轮询
        });

        // 加载 Office 状态
        async function loadOfficeState() {
            try {
                const response = await fetch('/api/office/state');
                const data = await response.json();
                
                if (data.agents && data.agents.length > 0) {
                    agentsData = data.agents;
                    renderAgents();
                }
                
                if (data.activities && data.activities.length > 0) {
                    feedItems = data.activities.slice(0, 10);
                    renderFeed();
                }
            } catch (error) {
                console.error('Failed to load office state:', error);
                // Fallback: 使用静态配置显示
                if (agentsData.length === 0) {
                    agentsData = agentsConfig.map(cfg => ({
                        ...cfg,
                        status: 'working',
                        currentTask: '初始化中...',
                        lastActivity: new Date().toISOString()
                    }));
                    renderAgents();
                }
            }
        }

        // 渲染 Agent 卡片
        function renderAgents() {
            const grid = document.getElementById('agentGrid');
            grid.innerHTML = '';

            agentsData.forEach((agent, index) => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.style.animationDelay = `${index * 0.1}s`;

                const statusClass = statusMap[agent.status] || 'idle';
                const affect = affects[Math.floor(Math.random() * affects.length)];
                const action = agent.currentTask || agent.description || '待命...';

                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar">
                            ${agent.emoji || '👤'}
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                        <div class="agent-identity">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role}</div>
                        </div>
                    </div>
                    <div class="agent-action">${action}</div>
                    <div class="agent-meta">
                        <span class="agent-affect">Affect: ${affect}</span>
                        <span class="agent-model">${agent.model || 'Qwen3.5-Plus'}</span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // 渲染活动流
        function renderFeed() {
            const list = document.getElementById('feedList');
            
            if (feedItems.length === 0) {
                list.innerHTML = '<div class="empty-state">Waiting for events...</div>';
                return;
            }

            list.innerHTML = '';
            feedItems.forEach((item, index) => {
                const feedItem = document.createElement('div');
                feedItem.className = 'feed-item';
                feedItem.style.animationDelay = `${index * 0.1}s`;

                const time = new Date(item.timestamp).toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                feedItem.innerHTML = `
                    <span class="feed-agent">${item.agentName || item.agent}</span>
                    <span class="feed-action">${item.content || item.action}</span>
                    <span class="feed-time">${time}</span>
                `;

                list.appendChild(feedItem);
            });
        }

        // 添加新的 Feed 项（用于 WebSocket 实时更新）
        function addFeedItem(agentName, action) {
            const list = document.getElementById('feedList');
            const emptyState = list.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const item = document.createElement('div');
            item.className = 'feed-item';

            const time = new Date().toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            item.innerHTML = `
                <span class="feed-agent">${agentName}</span>
                <span class="feed-action">${action}</span>
                <span class="feed-time">${time}</span>
            `;

            list.insertBefore(item, list.firstChild);

            // 限制 Feed 大小
            if (list.children.length > 10) {
                list.removeChild(list.lastChild);
            }
        }
    </script>
</body>
</html>
