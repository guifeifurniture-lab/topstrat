## 配置说明

本配置文件定义了谋士天团各任务类型的配额限制，防止任务队列堆积和资源耗尽。

---

## 配额配置

```yaml
cap_gates:
  # ========== 社交媒体发布 ==========
  post_tweet:
    limit: 10
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"
    warning_threshold: 0.8  # 80% 时发出警告
    
  post_weibo:
    limit: 8
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"

  # ========== 内容创作 ==========
  write_content:
    limit: 5
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"
    cooldown_minutes: 30  # 内容发布间隔至少 30 分钟
    
  write_newsletter:
    limit: 2
    window: weekly
    reset_time: "09:00"
    timezone: "Asia/Shanghai"

  # ========== 部署操作 ==========
  deploy:
    limit: 3
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"
    cooldown_minutes: 60  # 部署间隔至少 60 分钟
    require_approval: true  # 需要人工审批
    
  deploy_staging:
    limit: 10
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"
    cooldown_minutes: 15

  # ========== API 调用 ==========
  api_call:
    limit: 100
    window: hourly
    reset_time: null
    burst_limit: 20  # 每分钟最多 20 次突发
    
  api_call_external:
    limit: 50
    window: hourly
    reset_time: null

  # ========== 数据爬取 ==========
  web_scrape:
    limit: 20
    window: hourly
    reset_time: null
    cooldown_minutes: 2  # 爬取间隔至少 2 分钟
    
  web_scrape_deep:
    limit: 5
    window: hourly
    reset_time: null
    cooldown_minutes: 5

  # ========== 邮件发送 ==========
  send_email:
    limit: 50
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"
    
  send_email_bulk:
    limit: 200
    window: daily
    reset_time: "00:00"
    timezone: "Asia/Shanghai"
    require_approval: true

  # ========== 文件操作 ==========
  upload_file:
    limit: 50
    window: daily
    reset_time: "00:00"
    
  download_file:
    limit: 100
    window: daily
    reset_time: "00:00"

  # ========== 数据库操作 ==========
  db_write:
    limit: 1000
    window: hourly
    reset_time: null
    
  db_delete:
    limit: 100
    window: hourly
    reset_time: null
    require_approval: true

  # ========== AI 模型调用 ==========
  llm_call:
    limit: 500
    window: hourly
    reset_time: null
    cost_per_call: 0.002  # 每次调用成本（美元）
    daily_budget: 10.00   # 每日预算上限
    
  image_gen:
    limit: 50
    window: daily
    reset_time: "00:00"
    cost_per_call: 0.020
    daily_budget: 5.00

  # ========== 通知发送 ==========
  send_notification:
    limit: 100
    window: daily
    reset_time: "00:00"
    
  send_sms:
    limit: 20
    window: daily
    reset_time: "00:00"
    require_approval: true
```

---

## 配额类型说明

### 按时间窗口分类

| 窗口类型 | 说明 | 重置时间 |
|---------|------|---------|
| `hourly` | 自然小时 | 每小时整点自动重置 |
| `daily` | 自然日 | 按配置的 reset_time 重置 |
| `weekly` | 自然周 | 每周一 00:00 重置 |

### 按审批要求分类

| 审批类型 | 说明 | 示例 |
|---------|------|------|
| 自动审批 | 配额内自动执行 | post_tweet, api_call |
| 人工审批 | 需要人工确认 | deploy, db_delete, send_sms |

