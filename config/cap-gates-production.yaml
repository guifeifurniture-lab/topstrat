## 调整流程

1. **监控分析：** 商鞅（ops）每周检查配额使用报告
2. **提案调整：** 根据实际使用情况提出调整建议
3. **审批流程：** 诸葛亮（CEO）审批配额调整
4. **更新配置：** 更新本文件并提交 git
5. **生效部署：** 自动部署到生产环境

