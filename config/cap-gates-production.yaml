## 监控告警

### 告警阈值

- **警告（Warning）：** 配额使用达到 80%
- **严重（Critical）：** 配额使用达到 100%
- **拒绝（Rejected）：** 超额请求被拒绝

### 告警渠道

- 邮件通知：admin@topstrat.pages.dev
- 飞书机器人：谋士天团监控群
- Dashboard: https://topstrat.pages.dev/office

