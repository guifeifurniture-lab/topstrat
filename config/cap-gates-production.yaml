## 调优建议

### 初始配置（保守）

前 7 天使用保守配置，观察实际使用情况：

| 任务类型 | 初始配额 | 观察指标 |
|---------|---------|---------|
| post_tweet | 5 条/日 | 实际使用率、互动率 |
| write_content | 3 篇/日 | 阅读量、完成率 |
| deploy | 2 次/日 | 部署成功率、回滚率 |
| api_call | 50 次/小时 | 错误率、延迟 |

### 动态调整规则

- **连续 7 天使用率 < 50%** → 配额减少 20%
- **连续 7 天使用率 > 90%** → 配额增加 20%
- **频繁触发拒绝（>10 次/日）** → 立即分析原因，可能需要增加配额

---

## 应急处理

### 配额耗尽应急流程

1. **立即通知：** 系统自动发送告警到飞书群
2. **暂停任务：** 暂停对应类型的非关键任务
3. **人工审批：** 紧急任务走人工审批通道
4. **根因分析：** 24 小时内输出分析报告
5. **配置调整：** 根据分析结果调整配额

