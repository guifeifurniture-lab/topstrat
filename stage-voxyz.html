<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage | 谋士天团</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a1f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #22c55e;
            --status-idle: #4a4a55;
            --status-active: #4caf50;
            --status-busy: #f59e0b;
            --border-color: #27272a;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            padding: 24px;
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* Header */
        header {
            margin-bottom: 32px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        h1 { font-size: 1.5rem; font-weight: 600; }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ff4b4b;
            font-weight: bold;
            font-size: 0.875rem;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Agent List */
        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .agent-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.5s forwards;
        }

        .agent-card:hover {
            border-color: #333;
            transform: translateY(-2px);
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            position: relative;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--card-bg);
            background-color: var(--status-idle);
            transition: background-color 0.3s ease;
        }

        .status-dot.active { background-color: var(--status-active); }
        .status-dot.busy { background-color: var(--status-busy); }

        .agent-info { flex: 1; min-width: 0; }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .agent-name { font-weight: 600; font-size: 1rem; }
        .agent-role { font-size: 0.8rem; color: var(--text-secondary); }

        .agent-action {
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-top: 6px;
            line-height: 1.4;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .agent-affect {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 8px;
            display: inline-block;
            padding: 2px 8px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        /* Feed Section */
        .feed-section { margin-top: 40px; }

        .feed-header {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feed-item {
            background-color: rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent-color);
            opacity: 0;
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .feed-time {
            float: right;
            opacity: 0.6;
            font-size: 0.8em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            body { padding: 16px; }
            .header-top { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>谋士堂 · Stage</h1>
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    LIVE
                </div>
            </div>
            <p class="subtitle">Live handoffs & agent activity</p>
        </header>

        <!-- Agent List -->
        <div class="agent-list" id="agentList">
            <div class="loading">Loading agents...</div>
        </div>

        <!-- Activity Feed -->
        <div class="feed-section">
            <div class="feed-header">
                <span>⚡ Recent Activity</span>
            </div>
            <div id="feedContainer">
                <div class="empty-state">Waiting for events...</div>
            </div>
        </div>
    </div>

    <script>
        // 谋士配置（VoxYZ 风格简化版）
        const agentsConfig = [
            { id: 'zhugeliang', name: '诸葛亮', emoji: '💡', role: 'CEO/总指挥', model: 'Qwen3.5-Plus' },
            { id: 'guanzhong', name: '管仲', emoji: '🔧', role: 'CTO/技术架构', model: 'Qwen3.5-Plus' },
            { id: 'sunbin', name: '孙膑', emoji: '⚔️', role: '全栈开发', model: 'Qwen3.5-Plus' },
            { id: 'shangyang', name: '商鞅', emoji: '✍️', role: 'DevOps', model: 'Qwen3.5-Plus' },
            { id: 'xiaohe', name: '萧何', emoji: '📦', role: 'QA/测试', model: 'Qwen3.5-Plus' },
            { id: 'zhangliang', name: '张良', emoji: '📊', role: '侦察/竞品', model: 'Qwen3.5-Plus' },
            { id: 'fanli', name: '范蠡', emoji: '💰', role: 'CFO/财务', model: 'Qwen3.5-Plus' }
        ];

        const affects = ['between loops', 'focused', 'reflective'];
        const statusMap = { 'working': 'active', 'talking': 'active', 'coffee': 'idle', 'meeting': 'busy', 'handoff': 'active', 'idle': 'idle', 'offline': 'idle' };

        let agentsData = [];
        let feedItems = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadOfficeState();
            setInterval(loadOfficeState, 5000); // 5 秒轮询
        });

        // 加载数据
        async function loadOfficeState() {
            try {
                const response = await fetch('/api/office/state');
                if (!response.ok) throw new Error('API not available');
                const data = await response.json();
                
                if (data.agents && data.agents.length > 0) {
                    agentsData = data.agents;
                    renderAgents();
                }
                
                if (data.activities && data.activities.length > 0) {
                    feedItems = data.activities.slice(0, 10);
                    renderFeed();
                }
            } catch (error) {
                console.error('API failed, using fallback:', error);
                // Fallback: 使用静态配置
                if (agentsData.length === 0) {
                    agentsData = agentsConfig.map(cfg => ({
                        ...cfg,
                        status: 'working',
                        currentTask: '初始化中...',
                        lastActivity: new Date().toISOString()
                    }));
                    renderAgents();
                }
            }
        }

        // 渲染 Agent
        function renderAgents() {
            const list = document.getElementById('agentList');
            list.innerHTML = '';

            agentsData.forEach((agent, index) => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.style.animationDelay = `${index * 0.1}s`;

                const statusClass = statusMap[agent.status] || 'idle';
                const affect = affects[Math.floor(Math.random() * affects.length)];
                const action = agent.currentTask || agent.description || '待命...';

                card.innerHTML = `
                    <div class="avatar">
                        ${agent.emoji || '👤'}
                        <div class="status-dot ${statusClass}"></div>
                    </div>
                    <div class="agent-info">
                        <div class="agent-header">
                            <span class="agent-name">${agent.name}</span>
                            <span class="agent-role">${agent.model} · ${agent.role}</span>
                        </div>
                        <div class="agent-action" id="action-${agent.id}">${action}</div>
                        <div class="agent-affect">Affect: ${affect}</div>
                    </div>
                `;

                list.appendChild(card);
            });
        }

        // 渲染 Feed
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            
            if (feedItems.length === 0) {
                container.innerHTML = '<div class="empty-state">Waiting for events...</div>';
                return;
            }

            container.innerHTML = '';
            feedItems.forEach((item, index) => {
                const feedItem = document.createElement('div');
                feedItem.className = 'feed-item';
                feedItem.style.animationDelay = `${index * 0.1}s`;

                const time = new Date(item.timestamp).toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                feedItem.innerHTML = `
                    <strong>${item.agentName || item.agent}</strong>: 
                    ${item.content || item.action}
                    <span class="feed-time">${time}</span>
                `;

                container.appendChild(feedItem);
            });
        }

        // 模拟实时更新（VoxYZ 风格）
        function simulateUpdates() {
            setInterval(() => {
                if (agentsData.length === 0) return;
                
                const randomAgent = agentsData[Math.floor(Math.random() * agentsData.length)];
                const actionEl = document.getElementById(`action-${randomAgent.id}`);
                
                if (actionEl) {
                    actionEl.style.opacity = '0.5';
                    
                    setTimeout(() => {
                        const affects = ['between loops', 'focused', 'reflective'];
                        const newAffect = affects[Math.floor(Math.random() * affects.length)];
                        actionEl.textContent = randomAgent.currentTask || '处理任务...';
                        actionEl.style.opacity = '1';
                        
                        // 30% 概率添加 Feed 项
                        if (Math.random() > 0.7) {
                            addFeedItem(randomAgent.name, actionEl.textContent);
                        }
                    }, 300);
                }
            }, 2500);
        }

        // 添加 Feed 项
        function addFeedItem(agentName, action) {
            const container = document.getElementById('feedContainer');
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const item = document.createElement('div');
            item.className = 'feed-item';
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            item.innerHTML = `
                <strong>${agentName}</strong>: ${action}
                <span class="feed-time">${time}</span>
            `;

            container.insertBefore(item, container.firstChild);

            if (container.children.length > 5) {
                container.removeChild(container.lastChild);
            }
        }

        // 启动模拟更新
        setTimeout(simulateUpdates, 1000);
    </script>
</body>
</html>
