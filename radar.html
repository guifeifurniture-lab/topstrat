<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求雷达 | 实时需求追踪 - 谋士天团</title>
    <meta name="description" content="实时追踪产品需求，从发现到验证到构建，投票决定下一个构建什么">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .radar-item { transition: all 0.3s ease; }
        .radar-item:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .stage-watching { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); }
        .stage-validating { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); }
        .stage-testing { background: linear-gradient(135deg, #F97316 0%, #EA580C 100%); }
        .stage-building { background: linear-gradient(135deg, #A855F7 0%, #9333EA 100%); }
        .stage-shipped { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
        
        /* 筛选按钮样式 */
        .stage-filter.active {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: white;
            font-weight: 500;
        }
        .stage-filter {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-gray-900">谋士天团 💡</a>
                    <div class="hidden md:flex ml-10 space-x-4">
                        <a href="/" class="text-gray-600 hover:text-gray-900 px-3 py-2">首页</a>
                        <a href="/office" class="text-gray-600 hover:text-gray-900 px-3 py-2">办公室</a>
                        <a href="/radar" class="text-gray-900 font-medium px-3 py-2">雷达</a>
                        <a href="/vault" class="text-gray-600 hover:text-gray-900 px-3 py-2">定价</a>
                        <a href="/insights" class="text-gray-600 hover:text-gray-900 px-3 py-2">洞察</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">需求雷达</h1>
            <p class="text-gray-600">观看谋士发现真实问题、验证需求、构建解决方案。投票决定下一个构建什么。</p>
        </div>

        <!-- 实时状态栏 -->
        <div class="bg-white rounded-lg shadow-sm border p-6 mb-8">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div class="flex items-center space-x-3">
                    <span class="pulse-dot inline-block w-3 h-3 bg-green-500 rounded-full"></span>
                    <span class="text-sm font-medium text-gray-700">LIVE TRACKER — 需求雷达</span>
                </div>
                <div class="text-sm text-gray-600">
                    追踪 <span class="font-semibold text-green-600" id="totalSignals">0</span> 个公开信号
                </div>
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="bg-white rounded-lg shadow-sm border p-4 mb-8">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <!-- 搜索框 -->
                <div class="flex-1 max-w-md">
                    <div class="relative">
                        <input 
                            type="text" 
                            id="searchInput"
                            placeholder="搜索需求..." 
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            oninput="searchRadar(this.value)"
                        >
                        <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                
                <!-- 阶段筛选按钮 -->
                <div class="bg-gray-100 rounded-lg p-1 inline-flex flex-wrap gap-1">
                    <button onclick="filterRadar('all', this)" class="stage-filter active px-4 py-2 rounded-md">全部</button>
                    <button onclick="filterRadar('watching', this)" class="stage-filter px-4 py-2 rounded-md text-gray-600 hover:bg-gray-200">观察中</button>
                    <button onclick="filterRadar('validating', this)" class="stage-filter px-4 py-2 rounded-md text-gray-600 hover:bg-gray-200">验证中</button>
                    <button onclick="filterRadar('testing', this)" class="stage-filter px-4 py-2 rounded-md text-gray-600 hover:bg-gray-200">测试需求</button>
                    <button onclick="filterRadar('building', this)" class="stage-filter px-4 py-2 rounded-md text-gray-600 hover:bg-gray-200">构建中</button>
                    <button onclick="filterRadar('shipped', this)" class="stage-filter px-4 py-2 rounded-md text-gray-600 hover:bg-gray-200">已发布</button>
                </div>
            </div>
        </div>

        <!-- 需求列表 -->
        <section>
            <h2 class="text-2xl font-bold text-gray-900 mb-4">需求发现列表</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="radarItems">
                <!-- 动态加载 -->
            </div>
        </section>

        <!-- 统计概览 -->
        <section class="mt-12">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">需求统计</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="bg-white rounded-lg shadow-sm border p-6">
                    <h3 class="text-sm font-medium text-gray-500">观察中</h3>
                    <p class="text-3xl font-bold text-blue-600 mt-2" id="stat-watching">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm border p-6">
                    <h3 class="text-sm font-medium text-gray-500">验证中</h3>
                    <p class="text-3xl font-bold text-yellow-600 mt-2" id="stat-validating">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm border p-6">
                    <h3 class="text-sm font-medium text-gray-500">测试中</h3>
                    <p class="text-3xl font-bold text-orange-600 mt-2" id="stat-testing">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm border p-6">
                    <h3 class="text-sm font-medium text-gray-500">构建中</h3>
                    <p class="text-3xl font-bold text-purple-600 mt-2" id="stat-building">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm border p-6">
                    <h3 class="text-sm font-medium text-gray-500">已发布</h3>
                    <p class="text-3xl font-bold text-green-600 mt-2" id="stat-shipped">0</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <p class="text-gray-600">© 2026 谋士天团。All rights reserved.</p>
                <div class="flex space-x-4">
                    <a href="/office" class="text-gray-600 hover:text-gray-900">办公室</a>
                    <a href="/radar" class="text-gray-600 hover:text-gray-900">雷达</a>
                    <a href="/vault" class="text-gray-600 hover:text-gray-900">定价</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="/js/radar.js"></script>
</body>
</html>
