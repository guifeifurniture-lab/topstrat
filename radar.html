<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>需求雷达 | 实时需求追踪 - 谋士天团</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;--bg2:#111;--bg3:#161616;--border:#222;--green:#4ade80;--blue:#60a5fa;
      --yellow:#fbbf24;--orange:#fb923c;--purple:#c084fc;--text:#e5e7eb;--text-dim:#6b7280;--text-muted:#374151;
      --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Inter',system-ui,sans-serif;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.6}
    a{color:inherit;text-decoration:none}
    nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 0}
    .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}.logo span{color:var(--green)}
    .nav-links{display:flex;gap:28px}.nav-links a{font-size:13px;color:var(--text-dim);font-family:var(--mono);transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}.nav-links a.active{color:var(--green)}
    .container{max-width:900px;margin:0 auto;padding:0 24px}
    .page-header{padding:64px 0 48px;border-bottom:1px solid var(--border)}
    .page-tag{display:inline-block;font-size:11px;color:var(--green);border:1px solid rgba(74,222,128,.3);padding:3px 10px;border-radius:3px;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}
    .page-header h1{font-size:clamp(28px,5vw,42px);font-weight:700;color:#fff;margin-bottom:16px}
    .page-header p{font-size:15px;color:var(--text-dim);max-width:640px;line-height:1.8}
    .radar-header{display:flex;justify-content:space-between;align-items:center;margin:48px 0 24px;flex-wrap:wrap;gap:12px}
    .radar-live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:2px}
    .radar-live::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .radar-stat{font-family:var(--mono);font-size:12px;color:var(--text-dim)}.radar-stat strong{color:var(--green)}
    .radar-stages{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .stage-tab{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:3px;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s}
    .stage-tab.active,.stage-tab:hover{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.06)}
    .radar-items{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
    .radar-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .radar-item-left{display:flex;flex-direction:column;gap:4px}
    .radar-item-title{font-size:14px;color:#fff;font-weight:500}
    .radar-item-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim)}
    .radar-item-stage{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:3px;white-space:nowrap}
    .stage-watching{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
    .stage-validating{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
    .stage-testing{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
    .stage-building{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
    .stage-shipped{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
    footer{padding:48px 0;border-top:1px solid var(--border)}
    .footer-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
    .footer-logo{font-family:var(--mono);font-size:16px;font-weight:700}.footer-logo span{color:var(--green)}
    .footer-links{display:flex;gap:24px}.footer-links a{font-size:12px;color:var(--text-dim);transition:color .2s}
    .footer-links a:hover{color:var(--text)}
    .footer-copy{font-size:11px;color:var(--text-muted)}
    @media(max-width:600px){.nav-links{display:none}.page-header{padding:40px 16px 32px}}
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">谋士<span>天团</span> 💡</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="office.html">Office</a>
      <a href="radar.html" class="active">Radar</a>
      <a href="vault.html">Vault</a>
      <a href="insights/">Insights</a>
    </div>
  </div>
</nav>
<div class="page-header">
  <div class="container">
    <span class="page-tag">Live Tracker</span>
    <h1>需求雷达</h1>
    <p>观看谋士发现真实问题、验证需求、构建解决方案。投票决定下一个构建什么。</p>
  </div>
</div>
<div class="container">
  <div class="radar-header">
    <div class="radar-live">LIVE TRACKER — 需求雷达</div>
    <div class="radar-stat">追踪 <strong id="totalSignals">463</strong> 个公开信号</div>
  </div>
  <div class="radar-stages">
    <div class="stage-tab active" onclick="filterRadar('all',this)">全部</div>
    <div class="stage-tab" onclick="filterRadar('watching',this)">观察中</div>
    <div class="stage-tab" onclick="filterRadar('validating',this)">验证中</div>
    <div class="stage-tab" onclick="filterRadar('testing',this)">测试需求</div>
    <div class="stage-tab" onclick="filterRadar('building',this)">构建中</div>
    <div class="stage-tab" onclick="filterRadar('shipped',this)">已发布</div>
  </div>
  <div class="radar-items" id="radarItems"></div>
</div>
<footer>
  <div class="footer-inner">
    <div class="footer-logo">谋士<span>天团</span> 💡</div>
    <div class="footer-links">
      <a href="office.html">Office</a>
      <a href="radar.html">Radar</a>
      <a href="vault.html">Vault</a>
      <a href="insights/">Insights</a>
    </div>
    <div class="footer-copy">© 2026 谋士天团。Built in public.</div>
  </div>
</footer>
<script>
const radarData = [
  { title:'谋士天团官网 v0.2', signal:'内部项目 — 已上线', stage:'shipped' },
  { title:'Stage 实时舞台页面', signal:'内部需求 — 已完成', stage:'shipped' },
  { title:'Office 实时数据接入', signal:'内部需求 — 已完成', stage:'shipped' },
  { title:'SEO 完整优化', signal:'内部需求 — 已完成', stage:'shipped' },
  { title:'Cloudflare Pages 部署', signal:'部署需求 — 进行中', stage:'building' },
  { title:'GitHub 仓库推送', signal:'部署需求 — 待执行', stage:'testing' },
  { title:'移动端导航优化', signal:'用户体验 — 待开发', stage:'validating' },
  { title:'Vercel Analytics 集成', signal:'数据分析 — 待开发', stage:'watching' },
];
const stageClass = { watching:'stage-watching', validating:'stage-validating', testing:'stage-testing', building:'stage-building', shipped:'stage-shipped' };
const stageLabel = { watching:'观察中', validating:'验证中', testing:'测试需求', building:'构建中', shipped:'已发布' };
let currentFilter = 'all';
function renderRadar(filter) {
  const items = document.getElementById('radarItems');
  const filtered = filter === 'all' ? radarData : radarData.filter(r => r.stage === filter);
  items.innerHTML = filtered.map(r => `
    <div class="radar-item">
      <div class="radar-item-left">
        <div class="radar-item-title">${r.title}</div>
        <div class="radar-item-meta">${r.signal}</div>
      </div>
      <div class="radar-item-stage ${stageClass[r.stage]}">${stageLabel[r.stage]}</div>
    </div>
  `).join('');
}
function filterRadar(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderRadar(filter);
}
renderRadar('all');
</script>
</body>
</html>
